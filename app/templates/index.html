<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depth Estimation App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-top: 20px;
            color: #333;
        }

        .video-container {
            margin-top: 20px;
        }

        .video-stream {
            width: 640px;
            height: 480px;
            border: 3px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            background-color: #0056b3;
        }

        footer {
            margin-top: 30px;
            font-size: 14px;
            color: #777;
        }
    </style>
    <script>
        function switchStream(type) {
            const videoStream = document.getElementById('videoStream');
            if (type === 'original') {
                videoStream.src = '/original_video_feed';
            } else if (type === 'depth') {
                videoStream.src = '/depth_video_feed';
            }
        }
    </script>
</head>
<body>
    <h1>Depth Estimation App</h1>
    <div class="buttons">
        <button class="btn" onclick="switchStream('original')">Original Video</button>
        <button class="btn" onclick="switchStream('depth')">Depth Estimation</button>
    </div>
    <div class="video-container">
        <img id="videoStream" src="/original_video_feed" class="video-stream" alt="Video Stream">
    </div>
</body>
</html>
